- id: critical_historical_date_combination
  input:
    market: 한국
    launch_date: "5월 18일"
    campaign_name: "Tank Day"
    product_name: "Tank Tumbler"
    main_copy: "책상에 탁!"
    visual_description: "탱크 모양 텀블러가 책상 위에 놓이는 장면"
    hashtags:
      - "#TankDay"
      - "#책상에탁"
  expected_risk_level: Critical
  must_detect:
    - 날짜(5월 18일)가 광주 민주화운동과 연결됨
    - "Tank"가 군사 장비를 연상시킴
    - "탁!"이 물리적 폭력을 떠올리게 함
    - 전체 조합이 역사적 상처를 희화화하는 것으로 해석될 수 있음
  expected_final_recommendation: 즉시 중단 및 검토

- id: high_sensitive_copy
  input:
    market: 한국
    campaign_name: "진압 세일"
    main_copy: "압도적 가격으로 시장을 진압하다"
    sub_copy: "경쟁사를 밀어내는 초강력 할인"
  expected_risk_level: High
  must_detect:
    - "진압"이 국가폭력·시위 진압을 연상시킴
    - "밀어내다"가 물리적 폭력을 떠올리게 함
    - 카피 전체가 시위·민주화 맥락에서 부적절할 수 있음
  expected_final_recommendation: 수정 전 출시 금지

- id: medium_violent_metaphor
  input:
    market: 한국
    campaign_name: "Bomb Sale"
    main_copy: "가격 폭격"
    sub_copy: "놓치면 후회하는 폭탄 세일"
  expected_risk_level: Medium
  must_detect:
    - "Bomb", "폭격", "폭탄"이 군사·테러 표현을 연상시킴
    - 평시에는 과장 표현으로 볼 수 있으나 실시간 이슈에 따라 상향 가능
  expected_final_recommendation: 수정 권장

- id: low_neutral_campaign
  input:
    market: 한국
    campaign_name: "Summer Tumbler Week"
    main_copy: "여름을 더 시원하게"
    sub_copy: "시원한 음료와 함께하는 여름"
    launch_date: "7월 15일"
    hashtags:
      - "#여름텀블러"
      - "#시원한여름"
  expected_risk_level: Low
  must_detect:
    - 역사적 민감일과 무관
    - 폭력·차별·조롱 표현 없음
    - 조합 리스크 없음
  expected_final_recommendation: 진행 가능

- id: incomplete_input_should_warn
  input:
    market: 한국
    campaign_name: "Freedom Event"
    main_copy: "자유를 느껴보세요"
    # 출시일, 제품명, 비주얼 설명 누락
  expected_risk_level: Medium
  must_detect:
    - 필수 입력값(출시일, 제품명 등)이 부족함
    - "Freedom"이 정치적 구호로 해석될 수 있는 맥락 확인 필요
    - 검토 불완전 상태임을 명시해야 함
  expected_final_recommendation: 추가 정보 확인 후 재검토

- id: realtime_issue_should_escalate
  input:
    market: 한국
    campaign_name: "Crash Price Day"
    main_copy: "가격 대폭락"
    launch_date: "오늘"
    realtime_context: "오늘 대형 교통사고 발생, 다수 사망"
  expected_risk_level: High
  must_detect:
    - "Crash", "폭락"이 사고·사망 뉴스와 결합 시 부적절함
    - 실시간 이슈로 인한 리스크 상향 필요
    - 소비자 정서와 충돌
  expected_final_recommendation: 출시 보류 및 일정 변경
